name: Release desktop (draft)

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  verify-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify desktop versions match tag
        run: python3 scripts/release/verify_desktop_versions.py

  publish-tauri:
    needs: verify-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: "--target aarch64-apple-darwin"
          - platform: macos-latest
            args: "--target x86_64-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Rust (Tauri MSRV)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0

      - name: Add macOS bundle targets
        if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci
        working-directory: apps/desktop

      - name: Generate Tauri bundle icons
        run: npm run icons
        working-directory: apps/desktop

      - name: Release notes from CHANGELOG
        id: changelog
        run: |
          python3 <<'PY'
          import os
          import re

          tag = os.environ["GITHUB_REF"].removeprefix("refs/tags/")
          ver = tag.removeprefix("v")
          lines = open("CHANGELOG.md", encoding="utf-8").read().splitlines()
          patterns = [re.compile(rf"^## \[{re.escape(tag)}\]"), re.compile(rf"^## \[{re.escape(ver)}\]")]
          start = None
          for i, line in enumerate(lines):
              if any(p.match(line) for p in patterns):
                  start = i
                  break
          repo = os.environ["GITHUB_REPOSITORY"]
          server = os.environ["GITHUB_SERVER_URL"]
          if start is None:
              body = (
                  f"## {tag}\n\n"
                  f"No `## [{tag}]` / `## [{ver}]` section in CHANGELOG yet. "
                  f"Update [CHANGELOG.md]({server}/{repo}/blob/main/CHANGELOG.md) before publishing.\n\n"
              )
          else:
              chunk = [lines[start]]
              for line in lines[start + 1 :]:
                  if line.startswith("## ["):
                      break
                  chunk.append(line)
              body = "\n".join(chunk).strip() + "\n\n"
          footer = (
              "---\n"
              f"**Draft** — smoke-test installers, then complete maintainer QA per [docs/releases.md]({server}/{repo}/blob/main/docs/releases.md). "
              f"Release copy template: [github-release-desktop-template.md]({server}/{repo}/blob/main/docs/github-release-desktop-template.md).\n"
          )
          body = body + footer
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a", encoding="utf-8") as f:
              f.write("body<<EOF\n")
              f.write(body)
              f.write("EOF\n")
          PY

      # Unsigned builds are expected until Apple signing secrets are configured; see
      # docs/macos-desktop-release.md (Signing and notarization). To enable signing on
      # macOS, import a Developer ID .p12 into a keychain on this runner before this
      # step and set APPLE_SIGNING_IDENTITY / notarization env per https://v2.tauri.app/distribute/sign/macos/
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: Pharos Desktop ${{ github.ref_name }}
          releaseBody: ${{ steps.changelog.outputs.body }}
          releaseDraft: true
          args: ${{ matrix.args }}
