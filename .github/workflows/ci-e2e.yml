name: E2E (client-solid)

on:
  push:
    branches: [main]
    paths:
      - "apps/client-solid/**"
      - ".github/workflows/ci-e2e.yml"
  pull_request:
    paths:
      - "apps/client-solid/**"
      - ".github/workflows/ci-e2e.yml"

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/client-solid

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/client-solid/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Build client
        run: pnpm run build

      - name: Run Playwright
        run: pnpm exec playwright test
        env:
          CI: true
