name: E2E (client-solid)

on:
  push:
    branches: [main]
    paths:
      - "apps/client-solid/**"
      - "apps/desktop/src/docs/**"
      - "scripts/check-docs-desktop-web-parity.mjs"
      - "scripts/docs-desktop-web-parity-allowlist.json"
      - ".github/workflows/ci-e2e.yml"
  pull_request:
    paths:
      - "apps/client-solid/**"
      - "apps/desktop/src/docs/**"
      - "scripts/check-docs-desktop-web-parity.mjs"
      - "scripts/docs-desktop-web-parity-allowlist.json"
      - ".github/workflows/ci-e2e.yml"

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: apps/client-solid

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: apps/client-solid/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Docs desktop ↔ web parity
        run: pnpm run check:docs-parity

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Build client
        run: pnpm run build

      - name: Run Playwright (includes hash-router `#/docs/*` — e2e/docs-hash-router.spec.ts)
        run: pnpm exec playwright test
        env:
          CI: true

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/client-solid/playwright-report/
          retention-days: 14

      - name: Upload Playwright test-results (traces, screenshots, video)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: apps/client-solid/test-results/
          retention-days: 14
